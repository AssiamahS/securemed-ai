input {
  beats {
    port => 5044
    ssl_enabled => false  # Enable TLS in production with certs
  }
}

filter {
  # Tag all logs with HIPAA compliance marker
  mutate {
    add_field => { "compliance" => "HIPAA" }
  }

  # Parse LLM audit logs
  if "llm-audit" in [tags] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \| %{WORD:event_type} \| id=%{DATA:request_id} \| key=%{DATA:api_key_id} \| prompt_len=%{NUMBER:prompt_length} \| max_tokens=%{NUMBER:max_tokens}"
      }
    }
    mutate {
      convert => {
        "prompt_length" => "integer"
        "max_tokens" => "integer"
      }
    }
  }

  # Parse auditd logs (Linux audit daemon)
  if "auditd" in [tags] {
    grok {
      match => {
        "message" => "type=%{WORD:audit_type} msg=audit\(%{NUMBER:audit_epoch}:%{NUMBER:audit_serial}\): %{GREEDYDATA:audit_data}"
      }
    }
  }

  # Scrub any potential PHI from log messages
  # This is a safety net — the app should never log PHI
  mutate {
    gsub => [
      # Redact SSN patterns
      "message", "\b\d{3}-\d{2}-\d{4}\b", "[REDACTED-SSN]",
      # Redact email patterns in logs
      "message", "\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b", "[REDACTED-EMAIL]",
      # Redact phone patterns
      "message", "\b\d{3}[-.]?\d{3}[-.]?\d{4}\b", "[REDACTED-PHONE]"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "hipaa-logs-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_policy => "hipaa-retention"
  }
}
